<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>闪电单词 FlashWord</title>

<!-- PWA 配置 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D97757">
<meta name="mobile-web-app-capable" content="yes">
<!-- iOS 全屏 App 模式 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="闪电单词">
<!-- iOS 主屏图标（用 SVG 内联生成，不需要单独图片文件） -->
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #D97757;
  --blue-light: #E08B6D;
  --blue-pale: #FAF0EB;
  --blue-wash: #F5E6DE;
  --ink: #29241D;
  --ink-light: #6B5D4F;
  --ink-faint: #A89B8C;
  --surface: #FAF9F7;
  --surface-raised: #F3F1ED;
  --border: #E8DCCB;
  --border-light: #F0E8DD;
  --success: #5A9A6E;
  --danger: #C4553A;
  --warning: #C48A2B;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(41,36,29,0.05), 0 1px 2px rgba(41,36,29,0.03);
  --shadow-md: 0 4px 12px rgba(41,36,29,0.07), 0 2px 4px rgba(41,36,29,0.03);
  --shadow-lg: 0 10px 30px rgba(41,36,29,0.09), 0 4px 8px rgba(41,36,29,0.03);
  --font-cn: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
  --font-en: 'Playfair Display', Georgia, serif;
  --font-mono: 'JetBrains Mono', monospace;
  --tab-height: 68px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-cn);
  background: var(--surface);
  color: var(--ink);
  line-height: 1.6;
  overflow-x: hidden;
  padding-bottom: calc(var(--tab-height) + var(--safe-bottom) + 12px);
}

/* ===== Subtle background texture ===== */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse at 15% 0%, rgba(217,119,87,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(217,119,87,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(232,220,203,0.15) 0%, transparent 70%);
  pointer-events: none;
}

/* ===== Page Header ===== */
.page-header {
  padding: 20px 20px 0;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.page-header h1 {
  font-family: var(--font-en);
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--blue);
  letter-spacing: -0.02em;
}
.page-header .subtitle {
  font-size: 0.75rem;
  color: var(--ink-faint);
  font-weight: 300;
  letter-spacing: 0.05em;
}

/* ===== Tab Navigation ===== */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-height) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(250,249,247,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--ink-faint);
  font-family: var(--font-cn);
  font-size: 0.68rem;
  font-weight: 500;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  min-height: 44px;
}
.tab-item svg { width: 24px; height: 24px; transition: transform 0.2s; }
.tab-item.active { color: var(--blue); }
.tab-item.active svg { transform: scale(1.1); }
.tab-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2px;
  background: var(--blue);
  border-radius: 0 0 2px 2px;
}

/* ===== Sections ===== */
.section { display: none; padding: 16px 20px 24px; animation: fadeUp 0.3s ease; }
.section.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Input Styles ===== */
.input-group {
  position: relative;
  margin: 16px 0;
}
.input-group input,
.input-group textarea {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-cn);
  font-size: 1rem;
  color: var(--ink);
  background: var(--surface);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-group input:focus,
.input-group textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(217,119,87,0.12);
}
.input-group textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.7;
}
.input-group input::placeholder,
.input-group textarea::placeholder {
  color: var(--ink-faint);
  font-weight: 300;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 44px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-cn);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--blue);
  color: white;
  box-shadow: 0 2px 8px rgba(217,119,87,0.25);
}
.btn-primary:hover { background: var(--blue-light); }
.btn-outline {
  background: transparent;
  color: var(--blue);
  border: 1.5px solid var(--blue);
}
.btn-outline:hover { background: var(--blue-pale); }
.btn-ghost {
  background: var(--surface-raised);
  color: var(--ink);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--border-light); }
.btn-danger { background: var(--danger); color: white; }
.btn-block { width: 100%; }
.btn-sm { min-height: 36px; padding: 6px 14px; font-size: 0.8rem; }
.btn-icon {
  min-width: 44px; min-height: 44px;
  padding: 8px;
  border-radius: 50%;
  background: none; border: none;
  cursor: pointer;
  color: var(--ink-light);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-icon:hover { background: var(--border-light); color: var(--blue); }
.btn-icon:active { transform: scale(0.9); }
.btn-icon svg { width: 20px; height: 20px; }

.btn-row { display: flex; gap: 10px; margin: 12px 0; }
.btn-row > * { flex: 1; }

/* ===== Word Card (Search Result) ===== */
.word-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin: 16px 0;
  box-shadow: var(--shadow);
  animation: fadeUp 0.3s ease;
}
.word-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.word-card-word {
  font-family: var(--font-en);
  font-size: 1.8rem;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.word-card-phonetic {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--ink-faint);
  margin-top: 4px;
}
.word-card-translation {
  font-size: 1.15rem;
  color: var(--blue);
  font-weight: 500;
  margin: 12px 0;
  padding: 12px 16px;
  background: var(--blue-pale);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--blue);
}
.word-card-example {
  font-size: 0.85rem;
  color: var(--ink-light);
  font-style: italic;
  margin: 8px 0;
  padding-left: 12px;
  border-left: 2px solid var(--border);
}
.word-card-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border-light);
}

/* ===== Loading Spinner ===== */
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-top-width: 2.5px;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-faint);
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-faint);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 0.9rem; font-weight: 300; }

/* ===== Batch Tab ===== */
.batch-words {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0;
}
.batch-word-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.batch-word-chip:hover { border-color: var(--blue); }
.batch-word-chip.selected {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}
.batch-word-chip .chip-remove {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 0.7rem;
  opacity: 0.6;
}

/* ===== Vocabulary List ===== */
.vocab-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.vocab-search {
  flex: 1;
  min-width: 150px;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-cn);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.vocab-search:focus { border-color: var(--blue); }

.tag-filter {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch;
}
.tag-filter::-webkit-scrollbar { display: none; }
.tag-pill {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tag-pill:hover { border-color: var(--blue-light); }
.tag-pill.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

.vocab-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: all 0.15s;
}
.vocab-item:hover { box-shadow: var(--shadow); }
.vocab-word {
  font-family: var(--font-en);
  font-size: 1.15rem;
  min-width: 0;
  flex-shrink: 0;
}
.vocab-meaning {
  flex: 1;
  font-size: 0.85rem;
  color: var(--ink-light);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.vocab-tag {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--blue-pale);
  color: var(--blue);
  white-space: nowrap;
  flex-shrink: 0;
}
.vocab-actions { display: flex; gap: 2px; flex-shrink: 0; }
.vocab-actions .btn-icon { min-width: 36px; min-height: 36px; }
.vocab-actions .btn-icon svg { width: 16px; height: 16px; }

.sync-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  margin: 12px 0;
  background: linear-gradient(135deg, #FFF3E0, #FFF8E1);
  border: 1px solid #FFE0B2;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  color: #E65100;
  cursor: pointer;
  animation: syncPulse 2s ease-in-out infinite;
}
.sync-banner:active { opacity: 0.7; }
@keyframes syncPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.8; }
}
.data-actions {
  display: flex;
  gap: 8px;
  margin: 20px 0 12px;
  padding-top: 16px;
  border-top: 1px solid var(--border-light);
  flex-wrap: wrap;
}
.data-actions .btn { font-size: 0.8rem; }

/* ===== Memory Card ===== */
.memory-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.stat-box {
  flex: 1;
  padding: 14px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
}
.stat-num {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--blue);
}
.stat-label { font-size: 0.72rem; color: var(--ink-faint); margin-top: 2px; }

.flip-container {
  perspective: 1000px;
  width: 100%;
  max-width: 400px;
  margin: 0 auto 20px;
  min-height: 220px;
  cursor: pointer;
}
.flip-card {
  position: relative;
  width: 100%;
  min-height: 220px;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}
.flip-card.flipped { transform: rotateY(180deg); }
.flip-front, .flip-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
}
.flip-front {
  background: linear-gradient(135deg, #FFFCFA 0%, var(--blue-pale) 100%);
}
.flip-back {
  background: linear-gradient(135deg, var(--blue-pale) 0%, #FFFCFA 100%);
  transform: rotateY(180deg);
}
.flip-word {
  font-family: var(--font-en);
  font-size: 2.2rem;
  color: var(--ink);
  letter-spacing: -0.02em;
  text-align: center;
}
.flip-hint {
  font-size: 0.75rem;
  color: var(--ink-faint);
  margin-top: 16px;
}
.flip-translation {
  font-size: 1.3rem;
  color: var(--blue);
  font-weight: 500;
  text-align: center;
}
.flip-phonetic {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--ink-faint);
  margin-top: 8px;
}

.memory-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  max-width: 400px;
  margin: 0 auto;
}
.memory-actions .btn { flex: 1; min-height: 48px; font-size: 0.95rem; }
.btn-know { background: var(--success); color: white; }
.btn-know:hover { background: #4A8A5E; }
.btn-dont-know { background: var(--danger); color: white; }
.btn-dont-know:hover { background: #B0442C; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 20px calc(24px + var(--safe-bottom));
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal h3 {
  font-size: 1.1rem;
  margin-bottom: 16px;
  font-weight: 500;
}
.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.modal-tag {
  padding: 10px 18px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: var(--font-cn);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
}
.modal-tag:hover { border-color: var(--blue-light); }
.modal-tag.selected {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}
.modal-custom-tag {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-cn);
  font-size: 0.9rem;
  outline: none;
  margin-bottom: 16px;
}
.modal-custom-tag:focus { border-color: var(--blue); }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%; transform: translateX(-50%) translateY(-100px);
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  background: var(--ink);
  color: white;
  font-size: 0.85rem;
  z-index: 300;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== Responsive ===== */
@media (min-width: 600px) {
  .section { max-width: 560px; margin: 0 auto; }
  .modal { border-radius: var(--radius); margin-bottom: 40px; }
  .modal-overlay { align-items: center; }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ===== Hidden file input ===== */
#importInput { display: none; }

/* ===== Settings ===== */
.setting-group {
  margin-bottom: 20px;
}
.setting-label {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 6px;
}
.setting-desc {
  font-size: 0.72rem;
  color: var(--ink-faint);
  margin-bottom: 8px;
  line-height: 1.5;
}
.setting-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: var(--font-mono);
  background: var(--surface-raised);
  color: var(--ink);
  transition: border-color 0.2s;
}
.setting-input:focus {
  outline: none;
  border-color: var(--blue);
}
.setting-status {
  font-size: 0.75rem;
  margin-top: 6px;
  color: var(--ink-faint);
}
.setting-status.ok { color: var(--success); }
.setting-status.err { color: var(--danger); }

/* ===== Section titles ===== */
.section-title {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 20px 0 10px;
}

/* ===== Batch result cards ===== */
.batch-results {
  margin-top: 16px;
}
.batch-result-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  background: var(--surface);
}
.batch-result-word {
  font-family: var(--font-en);
  font-size: 1rem;
}
.batch-result-meaning {
  font-size: 0.82rem;
  color: var(--ink-light);
  flex: 1;
  margin: 0 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* ===== OCR Screenshot Area ===== */
.ocr-drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin: 12px 0 16px;
  background: var(--surface-raised);
  position: relative;
}
.ocr-drop-zone:hover,
.ocr-drop-zone.drag-over {
  border-color: var(--blue);
  background: var(--blue-pale);
}
.ocr-drop-zone svg { width: 36px; height: 36px; color: var(--ink-faint); margin-bottom: 8px; }
.ocr-drop-zone p { font-size: 0.85rem; color: var(--ink-light); }
.ocr-drop-zone .ocr-hint {
  font-size: 0.72rem;
  color: var(--ink-faint);
  margin-top: 6px;
}
.ocr-drop-zone .ocr-shortcut {
  display: inline-block;
  padding: 2px 8px;
  background: var(--surface);
  border: 1px solid var(--border);

<script>
// ===== 数据层 =====
const STORE_KEY = 'wordcollector_vocab';
const DEFAULT_TAGS = ['Claude', 'Codex'];
let _dataDirty = false; // 数据是否有未保存到文件的变更

// 合并文件数据和本地缓存（去重，保留更新的版本）
function mergeFileAndLocal() {
  let local = [];
  try { local = JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch {}
  const fileData = window.__WORDS_DATA__ || [];
  if (fileData.length === 0 && local.length === 0) return;
  if (fileData.length === 0) { _dataDirty = true; return; }
  if (local.length === 0) {
    localStorage.setItem(STORE_KEY, JSON.stringify(fileData));
    return;
  }

  // 以 word+tag 为唯一键合并，保留 addedAt 更新或 reviewCount 更多的
  const map = new Map();
  for (const item of fileData) {
    const key = (item.word || '').toLowerCase() + '|' + (item.tag || '').toLowerCase();
    map.set(key, { ...item });
  }
  let hasNew = false;
  for (const item of local) {
    const key = (item.word || '').toLowerCase() + '|' + (item.tag || '').toLowerCase();
    const existing = map.get(key);
    if (!existing) {
      map.set(key, { ...item });
      hasNew = true;
    } else {
      // 保留复习数据更多的版本
      const localReview = (item.reviewCount || 0);
      const fileReview = (existing.reviewCount || 0);
      if (localReview > fileReview) {
        map.set(key, { ...item });
        hasNew = true;
      } else if (localReview === fileReview && (item.addedAt || 0) > (existing.addedAt || 0)) {
        map.set(key, { ...item });
        hasNew = true;
      }
    }
  }

  const merged = [...map.values()].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
  localStorage.setItem(STORE_KEY, JSON.stringify(merged));
  if (hasNew || merged.length !== fileData.length) _dataDirty = true;
}

// 常见词过滤列表
const STOP_WORDS = new Set([
  'the','a','an','is','am','are','was','were','be','been','being',
  'have','has','had','do','does','did','will','would','could','should',
  'may','might','shall','can','need','dare','ought','used','to',
  'of','in','for','on','with','at','by','from','as','into','through',
  'during','before','after','above','below','between','out','off',
  'over','under','again','further','then','once','here','there',
  'when','where','why','how','all','both','each','few','more','most',
  'other','some','such','no','nor','not','only','own','same','so',
  'than','too','very','just','because','but','and','or','if','while',
  'about','up','down','it','its','i','me','my','we','our','you','your',
  'he','him','his','she','her','they','them','their','this','that',
  'these','those','what','which','who','whom','new','also','get','set',
  'ok','yes','no','true','false','null','undefined'
]);

function getVocab() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch { return []; }
}

function saveVocab(vocab) {
  localStorage.setItem(STORE_KEY, JSON.stringify(vocab));
  _dataDirty = true;
  updateSyncBadge();
}

function addWord(wordData) {
  const vocab = getVocab();
  const wordLower = wordData.word.toLowerCase();
  const tagLower = (wordData.tag || '').toLowerCase();
  const exists = vocab.find(w =>
    w.word.toLowerCase() === wordLower &&
    (w.tag || '').toLowerCase() === tagLower
  );
  if (exists) {
    showToast('这个词已经在生词本里了（相同标签）');
    return false;
  }
  vocab.unshift({ ...wordData, addedAt: Date.now(), reviewCount: 0, knownCount: 0 });
  saveVocab(vocab);
  return true;
}

function removeWord(word) {
  const vocab = getVocab().filter(w => w.word !== word);
  saveVocab(vocab);
}

function getAllTags() {
  const vocab = getVocab();
  const tags = new Set(DEFAULT_TAGS);
  vocab.forEach(w => { if (w.tag) tags.add(w.tag); });
  return [...tags];
}

// ===== 火山方舟 AI 设置 =====
const ARK_SETTINGS_KEY = 'wordcollector_ark';

function getArkSettings() {
  try { return JSON.parse(localStorage.getItem(ARK_SETTINGS_KEY) || '{}'); }
  catch { return {}; }
}

function saveArkSettings() {
  const key = document.getElementById('arkApiKey').value.trim();
  const model = document.getElementById('arkModel').value.trim();
  localStorage.setItem(ARK_SETTINGS_KEY, JSON.stringify({ key, model }));
  const status = document.getElementById('arkStatus');
  status.textContent = key ? '已保存' : '';
  status.className = 'setting-status' + (key ? ' ok' : '');
}

function loadArkSettings() {
  const s = getArkSettings();
  const keyInput = document.getElementById('arkApiKey');
  const modelInput = document.getElementById('arkModel');
  if (keyInput && s.key) keyInput.value = s.key;
  if (modelInput && s.model) modelInput.value = s.model;
}

async function testArkApi() {
  const s = getArkSettings();
  const status = document.getElementById('arkStatus');
  if (!s.key || !s.model) {
    status.textContent = '请先填写 API Key 和模型端点';
    status.className = 'setting-status err';
    return;
  }
  status.textContent = '测试中...';
  status.className = 'setting-status';
  try {
    const result = await fetchArkTranslation('hello', '', s);
    if (result) {
      status.textContent = '连接成功！返回：' + result;
      status.className = 'setting-status ok';
    } else {
      status.textContent = '连接失败，请检查 Key 和端点';
      status.className = 'setting-status err';
    }
  } catch (e) {
    status.textContent = '连接失败：' + e.message;
    status.className = 'setting-status err';
  }
}

// 调用火山方舟 API 获取 AI 翻译
async function fetchArkTranslation(word, tag, arkSettings) {
  const { key, model } = arkSettings || getArkSettings();
  if (!key || !model) return null;

  const softwareContext = tag ? `这个单词来自软件「${tag}」的界面。` : '';

  const res = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${key}`
    },
    body: JSON.stringify({
      model: model,
      stream: false,
      max_tokens: 200,
      messages: [
        {
          role: 'system',
          content: '你是一个英语词典助手。用户会给你一个英文单词或短语，请返回简洁的中文释义。格式要求：\n1. 第一行：词性缩写+中文释义（如有多个常见含义用；分隔，最多3个）\n2. 第二行：用中文描述这个单词在该软件中对应的功能或作用（一句话，不超过30字）\n\n示例输出：\nn. 仪表盘；控制面板\n查看系统运行状态和关键数据的总览页面\n\n注意：如果提供了软件语境，释义和功能描述都要匹配该软件中的实际含义。如果没有软件语境，第二行描述该单词在常见软件界面中的通用功能。'
        },
        {
          role: 'user',
          content: `${softwareContext}单词：${word}`
        }
      ]
    })
  });

  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    throw new Error(`API ${res.status}: ${errText.slice(0, 100)}`);
  }

  const data = await res.json();
  const content = data.choices?.[0]?.message?.content?.trim();
  return content || null;
}

// 解析 AI 返回的结构化文本
function parseArkResult(text) {
  if (!text) return null;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const translation = lines[0] || '';
  const example = lines[1] || '';
  return { translation, example };
}

// 一键刷新所有单词释义
async function refreshAllTranslations() {
  const s = getArkSettings();
  if (!s.key || !s.model) {
    showToast('请先在设置中填写 API Key');
    return;
  }
  const vocab = getVocab();
  if (vocab.length === 0) {
    showToast('生词本为空');
    return;
  }

  const btn = document.getElementById('refreshAllBtn');
  const status = document.getElementById('refreshStatus');
  btn.disabled = true;
  btn.textContent = '刷新中...';

  let done = 0;
  for (const item of vocab) {
    try {
      status.textContent = `正在刷新：${item.word}（${done + 1}/${vocab.length}）`;
      status.className = 'setting-status';
      const raw = await fetchArkTranslation(item.word, item.tag || '', s);
      const parsed = parseArkResult(raw);
      if (parsed) {
        if (parsed.translation) item.translation = parsed.translation;
        if (parsed.example) item.example = parsed.example;
      }
    } catch (e) {
      console.warn(`刷新 ${item.word} 失败:`, e);
    }
    done++;
    // 避免限流，间隔 300ms
    if (done < vocab.length) await new Promise(r => setTimeout(r, 300));
  }

  saveVocab(vocab);
  btn.disabled = false;
  btn.textContent = '一键刷新所有释义';
  status.textContent = `全部完成！已刷新 ${done} 个单词`;
  status.className = 'setting-status ok';
  renderVocab();
  showToast('所有释义已更新');
}

// ===== API 层 =====
// 带超时的 fetch，5秒超时
function fetchWithTimeout(url, ms = 5000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

// 中文翻译：MyMemory API（支持跨域，返回中文释义）
async function fetchTranslation(word) {
  try {
    const res = await fetchWithTimeout(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-CN`
    );
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData) {
      return data.responseData.translatedText;
    }
  } catch (e) { console.warn('翻译API失败:', e); }
  return null;
}

// 英英词典：只取音标和例句（释义不用它的）
async function fetchDictionary(word) {
  try {
    const res = await fetchWithTimeout(
      `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`
    );
    if (!res.ok) return null;
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      const entry = data[0];
      const phonetic = entry.phonetic || entry.phonetics?.find(p => p.text)?.text || '';
      let example = '';
      for (const m of (entry.meanings || [])) {
        for (const d of (m.definitions || [])) {
          if (d.example) { example = d.example; break; }
        }
        if (example) break;
      }
      return { phonetic, example };
    }
  } catch (e) { console.warn('词典API失败:', e); }
  return null;
}

async function lookupWord(word) {
  word = word.trim().toLowerCase();
  if (!word) return null;

  const arkSettings = getArkSettings();
  const hasArk = arkSettings.key && arkSettings.model;

  // 始终请求英英词典获取音标
  const dictPromise = fetchDictionary(word);

  let translation = '';
  let example = '';

  if (hasArk) {
    // 优先用 AI 翻译
    try {
      const raw = await fetchArkTranslation(word, '', arkSettings);
      const parsed = parseArkResult(raw);
      if (parsed?.translation) {
        translation = parsed.translation;
        example = parsed.example || '';
      }
    } catch (e) {
      console.warn('AI翻译失败，回退免费翻译:', e);
    }
  }

  // AI 没结果时用免费翻译兜底
  if (!translation) {
    translation = await fetchTranslation(word) || '暂无翻译';
  }

  const dictData = await dictPromise;

  return {
    word,
    translation,
    phonetic: dictData?.phonetic || '',
    example: example || dictData?.example || ''
  };
}

// 批量并发查询（每次最多3个并发，避免被限流）
async function batchLookup(words, onProgress) {
  const results = [];
  const concurrency = 3;

  for (let i = 0; i < words.length; i += concurrency) {
    const batch = words.slice(i, i + concurrency);
    const batchResults = await Promise.all(
      batch.map(w => lookupWord(w).catch(() => null))
    );
    for (const r of batchResults) {
      if (r) results.push(r);
    }
    if (onProgress) onProgress(Math.min(i + concurrency, words.length), words.length, results);
  }
  return results;
}

// ===== 发音 =====
function speak(word) {
  // 优先用有道词典在线发音（最可靠，支持所有平台）
  try {
    const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=1`);
    audio.volume = 1.0;
    const playPromise = audio.play();
    if (playPromise) {
      playPromise.catch(() => {
        // 在线发音失败，回退到浏览器语音合成
        speakFallback(word);
      });
    }
  } catch {
    speakFallback(word);
  }
}

function speakFallback(word) {
  if (!('speechSynthesis' in window)) {
    showToast('发音不可用，请检查网络');
    return;
  }
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utterance.voice = enVoice;
    utterance.onerror = () => showToast('发音失败，请重试');
    window.speechSynthesis.speak(utterance);
  }, 50);
}

// 图片转 base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function processOcrImage(file) {
  const previewDiv = document.getElementById('ocrPreview');
  const progressDiv = document.getElementById('ocrProgress');
  const url = URL.createObjectURL(file);

  previewDiv.innerHTML = `
    <div class="ocr-preview">
      <img src="${url}" alt="截图预览">
      <button class="ocr-remove" onclick="clearOcrPreview()">✕</button>
    </div>`;

  progressDiv.style.display = 'block';

  const setStatus = (msg) => {
    progressDiv.innerHTML = `
      <div class="ocr-progress">
        <div class="spinner"></div>
        <div style="flex:1">
          <div class="ocr-progress-text">${msg}</div>
          <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocrFill" style="width:0%"></div></div>
        </div>
      </div>`;
  };

  const ark = getArkSettings();
  let text = '';

  try {
    if (ark.key && ark.model) {
      // 优先用 AI 视觉识别：准确、快
      setStatus('AI 识别中...');
      const base64 = await fileToBase64(file);
      const mimeType = file.type || 'image/jpeg';

      const res = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ark.key}` },
        body: JSON.stringify({
          model: ark.model,
          max_tokens: 400,
          messages: [{
            role: 'user',
            content: [
              { type: 'image_url', image_url: { url: `data:${mimeType};base64,${base64}` } },
              { type: 'text', text: '这是一张软件界面或文字内容的图片。请从中提取有学习价值的英文词汇——包括技术术语、专业词汇、不常见或中高级词汇。\n\n请跳过：\n- 极常见词：the/a/an/is/are/was/be/it/in/on/at/to/of/for/and/or/not/yes/no\n- 基础 UI 词：ok/cancel/save/back/home/menu/close/open/next/done/edit/add/delete/new/file/view/help/search/settings/login/logout/sign/send/upload/download\n- 纯数字、符号、单个字母\n\n只返回单词原形，空格分隔，不要解释、不要编号、不要标点。' }
            ]
          }]
        })
      });

      if (!res.ok) throw new Error(`API ${res.status}`);
      const data = await res.json();
      text = data.choices?.[0]?.message?.content?.trim() || '';
    } else {
      // 兜底：Tesseract 本地识别（慢，需下载模型）
      setStatus('本地识别中（首次较慢，建议配置 API Key）...');
      const result = await Tesseract.recognize(file, 'eng', {
        logger: (m) => {
          if (m.status === 'recognizing text') {
            const fill = document.getElementById('ocrFill');
            if (fill) fill.style.width = Math.round(m.progress * 100) + '%';
          }
        }
      });
      // 只保留置信度 ≥ 70 的单词，过滤噪声
      text = (result.data.words || [])
        .filter(w => w.confidence >= 70 && /^[a-zA-Z]{3,}$/.test(w.text))
        .map(w => w.text)
        .join(' ');
    }

    progressDiv.style.display = 'none';

    if (!text.trim()) {
      showToast('未识别到英文单词，请换一张更清晰的图片');
      URL.revokeObjectURL(url);
      return;
    }

    document.getElementById('batchInput').value = text;
    extractWords();
    showToast(`识别完成，已提取 ${extractedWords.length} 个候选词`);
  } catch (err) {
    console.error('OCR失败:', err);
    progressDiv.style.display = 'none';
    showToast('识别失败：' + (err.message || '请重试'));
  }

  URL.revokeObjectURL(url);
}

// ===== 批量提取 =====
let extractedWords = [];
let selectedChips = new Set();

// 检查是否像一个合法英文单词
function isLikelyWord(w) {
  // 必须包含至少一个元音
  if (!/[aeiouy]/.test(w)) return false;
  // 过滤连续4个以上辅音（不太可能是真单词）
  if (/[^aeiouy]{4,}/.test(w)) return false;
  // 过滤单字母重复3次以上（如 aaa, bbb）
  if (/(.)\1{2,}/.test(w)) return false;
  // 最短3个字母（保留常见短词如 app, api）
  if (w.length < 3) return false;
  // 过滤纯辅音结尾+开头的2字母碎片拼接
  if (w.length === 3 && !/[aeiouy]/.test(w.slice(0,2))) return false;
  return true;
}

function extractWords() {
  const text = document.getElementById('batchInput').value;
  if (!text.trim()) return;

  const words = text.toLowerCase()
    .replace(/[^a-z\s'-]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length >= 3 && !STOP_WORDS.has(w) && /^[a-z]/.test(w) && isLikelyWord(w));

  extractedWords = [...new Set(words)];
  selectedChips = new Set(extractedWords);
  renderBatchChips();

  if (extractedWords.length === 0) {
    showToast('未提取到有效单词');
  }
}

function renderBatchChips() {
  const container = document.getElementById('batchChips');
  const actionsDiv = document.getElementById('batchActions');

  if (extractedWords.length === 0) {
    container.innerHTML = '';
    actionsDiv.style.display = 'none';
    return;
  }

  actionsDiv.style.display = 'block';
  container.innerHTML = extractedWords.map(w => `
    <span class="batch-word-chip ${selectedChips.has(w) ? 'selected' : ''}" onclick="toggleChip('${escAttr(w)}')">
      ${escHtml(w)}
    </span>`).join('');
}

function toggleChip(word) {
  if (selectedChips.has(word)) selectedChips.delete(word);
  else selectedChips.add(word);
  renderBatchChips();
}

function selectAllChips() {
  if (selectedChips.size === extractedWords.length) {
    selectedChips.clear();
  } else {
    selectedChips = new Set(extractedWords);
  }
  renderBatchChips();
}

async function batchSave() {
  if (selectedChips.size === 0) {
    showToast('请先选择单词');
    return;
  }
  pendingBatchWords = [...selectedChips];
  openBatchSaveModal();
}

async function confirmSave() {

  if (pendingWord) {
    const ok = addWord({ ...pendingWord, tag });
    if (ok) showToast(`"${pendingWord.word}" 已收藏`);

    resultsDiv.innerHTML = `
      <div class="ocr-progress">
        <div class="spinner"></div>
        <div style="flex:1">
          <div class="ocr-progress-text">正在查询 0/${total}...</div>

        </div>
      </div>
      <div id="batchResultItems"></div>`;

    let savedCount = 0;

    const results = await batchLookup(wordsToLookup, (done, total, partialResults) => {
      const fill = document.getElementById('batchFill');
      const text = resultsDiv.querySelector('.ocr-progress-text');
      if (fill) fill.style.width = Math.round(done / total * 100) + '%';
      if (text) text.textContent = `正在查询 ${done}/${total}...`;

      // 实时显示已查到的结果
      const itemsDiv = document.getElementById('batchResultItems');
      if (itemsDiv) {
        itemsDiv.innerHTML = partialResults.map(d => `
          <div class="batch-result-item">
            <span class="batch-result-word">${escHtml(d.word)}</span>
            <span class="batch-result-meaning">${escHtml(d.translation)}</span>
            <button class="btn-icon" onclick="speak('${escAttr(d.word)}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
            </button>
          </div>`).join('');
      }
    });

    // 保存到生词本
    for (const data of results) {
      const ok = addWord({ ...data, tag });
      if (ok) savedCount++;
    }

    // 移除进度条，只保留结果
    const progressEl = resultsDiv.querySelector('.ocr-progress');
    if (progressEl) progressEl.remove();

    showToast(`成功收藏 ${savedCount} 个单词`);
    pendingBatchWords = null;
  }
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('格式不正确');
      const current = getVocab();
      const currentWords = new Set(current.map(w => w.word.toLowerCase()));
      let added = 0;
      for (const item of data) {
        if (item.word && !currentWords.has(item.word.toLowerCase())) {
          current.push(item);
          currentWords.add(item.word.toLowerCase());
          added++;
        }
      }
      saveVocab(current);
      renderVocab();
      showToast(`导入成功，新增 ${added} 个单词`);
    } catch (err) {
      showToast('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  const vocab = getVocab();
  if (vocab.length === 0) {
    showToast('生词本已经是空的');
    return;
  }
  if (confirm(`确定清空所有 ${vocab.length} 个单词吗？此操作不可恢复。`)) {
    saveVocab([]);
    renderVocab();
    showToast('已清空');
  }
}

// ===== 记忆卡片 =====
let memoryQueue = [];
let currentCardIndex = 0;
let isFlipped = false;

function renderMemory() {
  const vocab = getVocab();
  const statsDiv = document.getElementById('memoryStats');
  const contentDiv = document.getElementById('memoryContent');

  if (vocab.length === 0) {
    statsDiv.innerHTML = '';
    contentDiv.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg><p>先去收藏一些单词吧</p></div>';
    return;
  }

  // 排序：不认识的优先（knownCount 少的排前面），加入随机性
  memoryQueue = [...vocab].sort((a, b) => {
    const aScore = (a.knownCount || 0) - (a.reviewCount || 0) * 0.5;
    const bScore = (b.knownCount || 0) - (b.reviewCount || 0) * 0.5;
    return aScore - bScore + (Math.random() - 0.5) * 0.3;
  });
  currentCardIndex = 0;
  isFlipped = false;

  const total = vocab.length;
  const mastered = vocab.filter(w => (w.knownCount || 0) >= 3).length;
  const learning = total - mastered;

  statsDiv.innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">总词汇</div></div>
    <div class="stat-box"><div class="stat-num">${learning}</div><div class="stat-label">学习中</div></div>
    <div class="stat-box"><div class="stat-num">${mastered}</div><div class="stat-label">已掌握</div></div>`;

  renderCurrentCard();
}

function renderCurrentCard() {
  const contentDiv = document.getElementById('memoryContent');

  if (currentCardIndex >= memoryQueue.length) {
    contentDiv.innerHTML = `
      <div class="empty-state" style="padding:40px">
        <p style="font-size:1.1rem;color:var(--ink)">本轮复习完成！</p>
        <p style="margin-top:8px">共复习了 ${memoryQueue.length} 个单词</p>
        <button class="btn btn-primary" style="margin-top:20px" onclick="renderMemory()">再来一轮</button>
      </div>`;
    return;
  }

  const card = memoryQueue[currentCardIndex];
  isFlipped = false;

  contentDiv.innerHTML = `
    <div style="text-align:center;font-size:0.8rem;color:var(--ink-faint);margin-bottom:12px">${currentCardIndex + 1} / ${memoryQueue.length}</div>
    <div class="flip-container" onclick="flipCard()">
      <div class="flip-card" id="flipCard">
        <div class="flip-front">
          <div class="flip-word">${escHtml(card.word)}</div>
          ${card.phonetic ? `<div class="flip-phonetic">${escHtml(card.phonetic)}</div>` : ''}
          <div class="flip-hint">点击翻转查看释义</div>
        </div>
        <div class="flip-back">
          <div class="flip-translation">${escHtml(card.translation || '暂无翻译')}</div>
          ${card.example ? `<div style="margin-top:16px;text-align:center;font-size:0.85rem;color:var(--ink-light);background:var(--blue-pale);padding:8px 14px;border-radius:var(--radius-sm)">${escHtml(card.example)}</div>` : ''}
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <button class="btn-icon" onclick="event.stopPropagation();speak('${escAttr(card.word)}')" style="background:var(--blue-pale);color:var(--blue)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      </button>
    </div>
    <div class="memory-actions">
      <button class="btn btn-dont-know" onclick="markCard(false)">不认识</button>
      <button class="btn btn-know" onclick="markCard(true)">认识</button>
    </div>`;
}

function flipCard() {
  const card = document.getElementById('flipCard');
  if (card) {
    isFlipped = !isFlipped;
    card.classList.toggle('flipped');
  }
}

function markCard(known) {
  const card = memoryQueue[currentCardIndex];
  const vocab = getVocab();
  const item = vocab.find(w => w.word === card.word);
  if (item) {
    item.reviewCount = (item.reviewCount || 0) + 1;
    if (known) item.knownCount = (item.knownCount || 0) + 1;
    else item.knownCount = Math.max(0, (item.knownCount || 0) - 1);
    saveVocab(vocab);
  }

  currentCardIndex++;
  renderCurrentCard();

  // 更新统计
  const total = vocab.length;
  const mastered = vocab.filter(w => (w.knownCount || 0) >= 3).length;
  const learning = total - mastered;
  document.getElementById('memoryStats').innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">总词汇</div></div>
    <div class="stat-box"><div class="stat-num">${learning}</div><div class="stat-label">学习中</div></div>
    <div class="stat-box"><div class="stat-num">${mastered}</div><div class="stat-label">已掌握</div></div>`;
}

// ===== 同步状态 =====
function updateSyncBadge() {
  const banner = document.getElementById('syncBanner');
  if (banner) banner.style.display = _dataDirty ? 'flex' : 'none';
}

// ===== Toast =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===== 工具函数 =====
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function escAttr(str) {
  return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', () => {
  mergeFileAndLocal();
  renderVocab();
  loadArkSettings();
  updateSyncBadge();
});

// ===== PWA Service Worker 注册 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('闪电单词 SW 已注册'))
      .catch((err) => console.warn('SW 注册失败:', err));
  });
}
</script>
